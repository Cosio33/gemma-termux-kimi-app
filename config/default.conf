# =============================================================================
# Gemma Termux App - Configuración por Defecto
# =============================================================================

[model]
# Ruta al modelo GGUF (relativa a models/ o ruta absoluta)
model_path = models/gemma-4b-it.gguf

# Tamaño del contexto (en tokens)
context_size = 4096

# Temperatura: 0.0 = determinista, 1.0 = creativo
temperature = 0.7

# Máximo de tokens a generar
max_tokens = 2048

# Top-p sampling (nucleus sampling)
top_p = 0.9

# Top-k sampling
top_k = 40

# Penalización por repetición
repeat_penalty = 1.1

[memory]
# Habilitar memoria persistente
enabled = true

# Límite de mensajes en contexto
max_context_messages = 50

# Importancia mínima para recordar automáticamente
auto_remember_importance = 7

[skills]
# Directorio de skills
skills_dir = skills

# Auto-recargar skills al detectar cambios
auto_reload = false

# Habilitar skills específicos (vacío = todos)
enabled_skills = 

# Deshabilitar skills específicos
disabled_skills = 

[sandbox]
# Directorio del sandbox
sandbox_dir = sandbox

# Tamaño máximo de archivo (en MB)
max_file_size = 10

# Extensiones permitidas (vacío = todas)
allowed_extensions = .txt,.py,.md,.json,.yaml,.yml,.html,.css,.js

# Extensiones prohibidas
forbidden_extensions = .exe,.dll,.so,.bin

[interface]
# Idioma de la interfaz
language = es

# Mostrar timestamp en mensajes
show_timestamps = false

# Colores en la terminal
use_colors = true

# Guardar historial de comandos
save_history = true

[advanced]
# Backend de inferencia: llama-cpp, auto
backend = llama-cpp

# Número de threads para inferencia (0 = auto)
threads = 0

# Batch size
batch_size = 512

# GPU layers (para aceleración GPU, 0 = CPU)
gpu_layers = 0

# Log level: debug, info, warning, error
log_level = info
